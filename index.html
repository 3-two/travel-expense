<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<title>旅途记 · 旅行记账</title>
<style>
:root {
  --bg:#f5f0eb;--card:#fff;--text:#2d2320;--sub:#8c7b72;
  --primary:#e8675a;--primary-dark:#c94d41;--accent:#4a9e8f;--gold:#d4a853;
  --border:#e8e0d8;--shadow:0 2px 16px rgba(45,35,32,.06);
  --radius:16px;--radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC",sans-serif;
  --nav-height:72px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --cat-eat:#e8675a;--cat-stay:#5b8cb8;--cat-transport:#4a9e8f;--cat-shop:#d4a853;--cat-clothes:#9b7ec4;--cat-other:#8c7b72;
  --personal-bg:#fff5f5;--personal-border:#f4c2c2;--shared-bg:#f5f9fc;--shared-border:#b8d4e3;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none;
  padding-bottom:calc(var(--nav-height) + var(--safe-bottom) + 16px);
  max-width:480px;margin:0 auto;min-height:100dvh;
}
header{
  position:sticky;top:0;z-index:100;background:var(--bg);
  padding:calc(var(--safe-top)+12px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
}
header h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
header .actions{display:flex;gap:8px}
header .actions button,.global-currency-btn{
  border:none;background:var(--card);width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;
}
header .actions button:active,.global-currency-btn:active{transform:scale(.94)}
.global-currency-btn{width:auto;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;color:var(--accent);gap:4px}
.global-currency-btn.showing-rmb{background:var(--accent);color:#fff}

main{padding:0 14px}
.tab-content{display:none;animation:fadeIn .3s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── 录入 ── */
.paste-area{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.paste-area textarea{
  width:100%;border:2px dashed var(--border);border-radius:var(--radius-sm);
  padding:14px;font-size:14px;font-family:var(--font);resize:vertical;
  min-height:120px;background:transparent;color:var(--text);line-height:1.7;outline:none;
}
.paste-area textarea:focus{border-color:var(--primary)}
.paste-area .hint{font-size:12px;color:var(--sub);margin-top:6px;text-align:center}
.parse-btn{
  width:100%;border:none;background:var(--primary);color:#fff;
  padding:14px;border-radius:var(--radius-sm);font-size:16px;font-weight:600;
  cursor:pointer;margin-top:10px;transition:all .2s;
}
.parse-btn:active{background:var(--primary-dark);transform:scale(.98)}
.parse-result{font-size:13px;color:var(--accent);text-align:center;margin-top:8px;font-weight:500}

/* ── 筛选 ── */
.filter-row{
  display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:7px 15px;border-radius:20px;font-size:13px;font-weight:500;
  border:1.5px solid var(--border);background:transparent;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}

/* ── 日期分组 ── */
.date-group{margin-bottom:16px}
.date-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 6px 6px;position:sticky;top:56px;z-index:10;
  background:var(--bg);border-bottom:2px solid var(--border);
}
.date-label{font-size:15px;font-weight:700;color:var(--text)}
.date-subtotal{display:flex;gap:8px;font-size:12px;font-weight:600}
.ds-shared{color:var(--cat-stay);background:#eef5f9;padding:2px 8px;border-radius:8px}
.ds-personal{color:var(--cat-eat);background:#fef0ef;padding:2px 8px;border-radius:8px}

/* ── 账单条目 ── */
.entry-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.entry-card{
  background:var(--card);border-radius:var(--radius);padding:12px 14px;
  box-shadow:var(--shadow);display:grid;
  grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
  transition:all .2s;cursor:pointer;
}
/* 分（个人）条目 - 粉底 */
.entry-card.type-personal{
  background:#fff5f5;
  border:1.5px solid #f4c2c2;
}
/* 总（共同）条目 - 淡蓝底 */
.entry-card.type-shared{
  background:#fafcff;
}
.entry-card.pending{opacity:.5}
.entry-card .cat-badge{
  width:36px;height:36px;border-radius:10px;display:flex;
  align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.cat-badge.cat-吃{background:#fef0ef}.cat-badge.cat-住{background:#eef5f9}
.cat-badge.cat-行{background:#edf6f4}.cat-badge.cat-购物{background:#fdf7ea}
.cat-badge.cat-衣{background:#f3eff8}.cat-badge.cat-其他{background:#f5f3f1}

.entry-card .info{min-width:0}
.entry-card .info .desc{font-size:14px;font-weight:600;line-height:1.3;word-break:break-all}
.entry-card .info .meta{font-size:11px;color:var(--sub);margin-top:2px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.entry-card .info .meta .tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.tag-shared{background:#eef5f9;color:var(--cat-stay)}
.tag-personal{background:#ffeaea;color:#c0392b}
.tag-pending{background:#fdf7ea;color:#b8860b}

.entry-card .amount-col{text-align:right;flex-shrink:0}
.entry-card .amount-col .bill-amt{
  font-size:17px;font-weight:700;cursor:pointer;user-select:none;
  padding:2px 6px;border-radius:6px;margin:-2px -6px;transition:all .15s;
}
.entry-card .amount-col .bill-amt:active{background:var(--bg)}
.entry-card .amount-col .actual-amt{font-size:11px;color:var(--sub);margin-top:1px}
.entry-card .amount-col .pay-method{font-size:10px;color:var(--accent);font-weight:500;margin-top:1px}
/* 分摊说明小字 */
.entry-card .split-hint{font-size:10px;color:var(--sub);margin-top:1px;font-style:italic}

/* ── 公式说明卡片 ── */
.formula-card{
  background:linear-gradient(135deg,#f0f7f5,#f5f9fc);
  border:1px solid #c8dcd6;border-radius:var(--radius);
  padding:14px 16px;margin-bottom:14px;font-size:13px;line-height:1.8;
}
.formula-card strong{color:var(--accent)}
.formula-card .formula-highlight{color:var(--primary);font-weight:700}

/* ── 统计 ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{
  background:var(--card);border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);text-align:center;
}
.stat-card.stat-personal-card{border:2px solid #f4c2c2;background:#fffafa}
.stat-card .stat-val{font-size:24px;font-weight:800;letter-spacing:-1px}
.stat-card .stat-label{font-size:11px;color:var(--sub);margin-top:2px}
.stat-card .stat-sub{font-size:12px;color:var(--sub);margin-top:2px}

/* 人数选择器 */
.headcount-bar{
  display:flex;align-items:center;justify-content:center;gap:12px;
  background:var(--card);border-radius:var(--radius);padding:12px;
  box-shadow:var(--shadow);margin-bottom:12px;
}
.headcount-bar .hc-label{font-size:14px;font-weight:600}
.headcount-bar button{
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--card);font-size:18px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:all .15s;
}
.headcount-bar button:active{background:var(--bg)}
.headcount-bar .hc-val{font-size:22px;font-weight:800;min-width:32px;text-align:center}
.headcount-bar .hc-unit{font-size:13px;color:var(--sub)}

.chart-card{
  background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;
}
.chart-card h3{font-size:14px;font-weight:700;margin-bottom:10px}
.chart-wrapper{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.chart-wrapper svg{flex-shrink:0}
.chart-legend{flex:1;min-width:120px;display:flex;flex-direction:column;gap:5px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-item .legend-name{flex:1}
.legend-item .legend-val{font-weight:700}

/* 人员汇总表 */
.person-summary-row{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;
}
.person-card{
  background:var(--card);border-radius:var(--radius);padding:14px;
  box-shadow:var(--shadow);
}
.person-card.self{border-left:4px solid var(--primary)}
.person-card.partner{border-left:4px solid var(--accent)}
.person-card .pc-name{font-size:14px;font-weight:700;margin-bottom:6px}
.person-card .pc-total{font-size:26px;font-weight:800}
.person-card .pc-break{font-size:11px;color:var(--sub);line-height:1.6}
.person-card .pc-break span{font-weight:600;color:var(--text)}

/* 类目明细表 */
.cat-table-wrap{overflow-x:auto}
.cat-table{width:100%;border-collapse:collapse;font-size:13px}
.cat-table th{
  text-align:left;font-weight:600;color:var(--sub);font-size:11px;
  padding:8px 4px;border-bottom:1.5px solid var(--border);white-space:nowrap;
}
.cat-table td{padding:9px 4px;border-bottom:1px solid var(--border)}
.cat-table td:last-child{text-align:right;font-weight:700}
.cat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* ── 伙伴视图 ── */
.partner-header{
  background:linear-gradient(135deg,#e8675a,#d4a853);
  border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(232,103,90,.25);
}
.partner-header .total-spent{font-size:36px;font-weight:800;letter-spacing:-1px}
.partner-header .total-label{font-size:13px;opacity:.85;margin-top:2px}

.partner-card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);margin-bottom:10px;
}
.partner-card h4{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.partner-card .owe-amount{font-size:30px;font-weight:800;color:var(--primary)}
.partner-card .owe-detail{font-size:12px;color:var(--sub);margin-top:3px;line-height:1.7}

/* 付款明细卡片 */
.reimburse-box{
  background:#fef9f0;border:1.5px solid #f0d78c;border-radius:var(--radius);
  padding:14px;margin-bottom:10px;
}
.reimburse-box h4{font-size:13px;font-weight:700;color:#8a6d3b;margin-bottom:8px}
.reimburse-box .rb-line{font-size:13px;line-height:1.8;display:flex;justify-content:space-between}
.reimburse-box .rb-line .rb-val{font-weight:700}
.reimburse-box .rb-divider{border-top:1px dashed #d4c5a0;margin:6px 0}

/* ── Bottom Nav ── */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--card);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:5px 0 calc(5px + var(--safe-bottom));
  z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,.04);
}
nav .nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  border:none;background:none;cursor:pointer;padding:5px 10px;
  color:var(--sub);font-size:10px;font-weight:500;transition:all .2s;
  border-radius:12px;min-width:56px;
}
nav .nav-item .nav-icon{font-size:20px;line-height:1}
nav .nav-item.active{color:var(--primary)}
nav .nav-item:active{background:var(--bg)}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s;
}
.modal-sheet{
  background:var(--card);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;padding:20px 20px calc(20px + var(--safe-bottom));
  animation:slideUp .25s ease;max-height:85vh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet h3{font-size:17px;font-weight:700;margin-bottom:14px}
.modal-sheet .form-group{margin-bottom:12px}
.modal-sheet label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:4px}
.modal-sheet input,.modal-sheet select{
  width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:11px;font-size:14px;font-family:var(--font);outline:none;background:var(--bg);
}
.modal-sheet input:focus{border-color:var(--primary)}
.modal-sheet .btn-row{display:flex;gap:8px;margin-top:14px}
.modal-sheet .btn-row button{flex:1;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-cancel{background:var(--bg);color:var(--text)}
.btn-save{background:var(--primary);color:#fff}
.btn-save:active{background:var(--primary-dark)}

/* Toast */
.toast{
  position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:500;z-index:300;animation:toastIn .3s;
  pointer-events:none;white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.empty-state{text-align:center;padding:40px 20px;color:var(--sub)}
.empty-state .empty-icon{font-size:40px;margin-bottom:8px}
.empty-state p{font-size:13px}
.pending-bar{
  background:#fdf7ea;border:1px solid #f0d78c;border-radius:var(--radius-sm);
  padding:10px 12px;font-size:12px;color:#8a6d3b;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.share-btn{
  border:none;background:var(--accent);color:#fff;padding:12px 20px;
  border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;
  width:100%;margin-top:10px;transition:all .2s;
}
.share-btn:active{transform:scale(.98);opacity:.9}

/* 类目颜色小标签 */
.cat-stripe-吃{background:var(--cat-eat)}.cat-stripe-住{background:var(--cat-stay)}
.cat-stripe-行{background:var(--cat-transport)}.cat-stripe-购物{background:var(--cat-shop)}
.cat-stripe-衣{background:var(--cat-clothes)}.cat-stripe-其他{background:var(--cat-other)}
</style>
</head>
<body>

<header>
  <h1>🌏 旅途记</h1>
  <div class="actions">
    <button class="global-currency-btn" id="globalCurrencyBtn" title="切换全部币种显示"><span>₩⇄¥</span></button>
    <button id="settingsBtn" title="汇率 & 人数设置">⚙️</button>
  </div>
</header>

<main>
  <!-- 录入 -->
  <div class="tab-content active" id="tab-input">
    <div class="paste-area">
      <textarea id="rawInput" placeholder="在此粘贴账单文字...

示例：
5.26 吃
总支付宝宵夜芝士鸡 175rmb

5.27 行
分w电话卡 103rmb

支持：
• 金额: 175rmb / 66000韩币 / ¥298
• 类型: 总（共同均摊）/ 分（个人全部承担）
• 标记: w分 → 记在w名下
• 支付: 支付宝 / 微信 / 现金 / 银行卡"></textarea>
      <div class="hint">💡 粘贴后点「识别录入」· 自动解析日期/类目/金额/币种</div>
      <button class="parse-btn" id="parseBtn">🔍 识别录入</button>
      <div class="parse-result" id="parseResult"></div>
    </div>
    <div style="text-align:center;font-size:13px;color:var(--sub);margin-bottom:8px">
      已加载示例 · 共 <strong id="demoCount">21</strong> 条
    </div>
  </div>

  <!-- 账单 -->
  <div class="tab-content" id="tab-bills">
    <div class="formula-card" style="font-size:12px;padding:10px 14px;margin-bottom:10px">
      💡 <strong>总</strong> = 共同消费 → 按人数均摊 &nbsp;|&nbsp; <span class="formula-highlight">分</span> = 个人消费 → <strong>全部由该成员承担</strong>，不计入分摊
    </div>
    <div class="filter-row" id="filterRow">
      <span class="filter-chip active" data-filter="all">全部</span>
      <span class="filter-chip" data-filter="吃">🍜 吃</span>
      <span class="filter-chip" data-filter="住">🏠 住</span>
      <span class="filter-chip" data-filter="行">🚗 行</span>
      <span class="filter-chip" data-filter="购物">🛍 购物</span>
      <span class="filter-chip" data-filter="pending">⚠️ 待确认</span>
    </div>
    <div class="pending-bar" id="pendingBar" style="display:none">⚠️ <span id="pendingText"></span> — 点击条目补充金额</div>
    <div id="entryListWrap"></div>
    <div class="empty-state" id="emptyBills"><div class="empty-icon">📭</div><p>还没有账单记录</p></div>
  </div>

  <!-- 统计 -->
  <div class="tab-content" id="tab-stats">
    <div class="headcount-bar">
      <span class="hc-label">👥 分摊人数</span>
      <button id="hcMinus">−</button>
      <span class="hc-val" id="hcVal">2</span>
      <button id="hcPlus">+</button>
      <span class="hc-unit">人</span>
    </div>
    <div id="personCards" class="person-summary-row"></div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chart-card">
      <h3>📊 类目分布（所有支出）</h3>
      <div class="chart-wrapper">
        <svg id="donutChart" width="150" height="150" viewBox="0 0 150 150"></svg>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
    </div>
    <div class="chart-card">
      <h3>📋 各类目明细</h3>
      <div class="cat-table-wrap"><table class="cat-table" id="categoryTable"></table></div>
    </div>
  </div>

  <!-- 伙伴视图 -->
  <div class="tab-content" id="tab-partner">
    <div class="partner-header" id="partnerHeader"></div>
    <div class="partner-card" id="partnerOwe"></div>
    <div class="reimburse-box" id="reimburseBox"></div>
    <div class="chart-card" style="margin-bottom:10px">
      <h3>📋 各类目明细（共同部分 ÷ <span id="partnerHeadcount">2</span>人）</h3>
      <div class="cat-table-wrap"><table class="cat-table" id="partnerCatTable"></table></div>
    </div>
    <button class="share-btn" id="shareBtn">📤 分享给伙伴</button>
  </div>
</main>

<nav>
  <button class="nav-item active" data-tab="input"><span class="nav-icon">📝</span>录入</button>
  <button class="nav-item" data-tab="bills"><span class="nav-icon">📋</span>账单</button>
  <button class="nav-item" data-tab="stats"><span class="nav-icon">📊</span>统计</button>
  <button class="nav-item" data-tab="partner"><span class="nav-icon">👥</span>伙伴</button>
</nav>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingsModal" style="display:none">
  <div class="modal-sheet">
    <h3>⚙️ 设置</h3>
    <div class="form-group">
      <label>分摊人数（共同消费 ÷ 几人）</label>
      <div style="display:flex;align-items:center;gap:10px">
        <button id="setHcMinus" style="width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);font-size:18px;cursor:pointer">−</button>
        <span id="setHcVal" style="font-size:22px;font-weight:800;min-width:28px;text-align:center">2</span>
        <button id="setHcPlus" style="width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);font-size:18px;cursor:pointer">+</button>
      </div>
    </div>
    <div class="form-group">

<script>

// ── 示例数据 ──

];

// ── 工具 ──
function toRMB(amt,cur){if(amt===null||amt===undefined)return 0;return cur==='KRW'?amt*krwRate:amt}
function getActualPay(e){if(e.actualPay!==null&&e.actualPay!==undefined)return e.actualPay;return toRMB(e.billAmt,e.billCur)}
function fmtMoneyDual(amt,cur){
  if(amt===null||amt===undefined)return'—';
  if(showAllRMB){const r=toRMB(amt,cur);return cur==='KRW'?'¥'+r.toFixed(2)+' (₩'+amt.toLocaleString()+')':'¥'+Number(amt).toFixed(2)}
  return cur==='KRW'?'₩'+amt.toLocaleString()+' (≈¥'+toRMB(amt,cur).toFixed(2)+')':'¥'+Number(amt).toFixed(2)
}
function catEmoji(cat){const m={'吃':'🍜','住':'🏠','行':'🚗','购物':'🛍','衣':'👔','其他':'📦'};return m[cat]||'📦'}

// ── 解析器（同之前，略作优化）──
function parseText(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const result=[];let curDate='',curCat='其他',curType='总',curPerson=null;
  const catMap={行:'行',住:'住',吃:'吃',衣:'衣',购物:'购物',剪发:'购物',其他:'其他'};
  for(const line of lines){
    if(/^[-—]+$/.test(line))continue;
    const dom=line.match(/^(\d+\.\d+)$/);
    if(dom){curDate=dom[1];continue}
    const dm=line.match(/^(\d+\.\d+)\s+(.+)/);
    if(dm){curDate=dm[1];const rest=dm[2].trim();
      if(catMap[rest]||catMap[rest.slice(0,2)]){const c=catMap[rest]||catMap[rest.slice(0,2)];if(c)curCat=c;continue}
      const e=parseLine(rest,curDate,curCat,curType,curPerson);
      if(e){if(e.cat)curCat=e.cat;if(e.typeSet)curType=e.typeSet;if(e.personSet!==undefined)curPerson=e.personSet;result.push(e)}continue}
    const cl=line.replace(/[：:]\s*$/,'').trim();
    if(catMap[cl]){curCat=catMap[cl];continue}
    if(cl==='剪发'){curCat='购物';continue}
    const e=parseLine(line,curDate,curCat,curType,curPerson);
    if(e){if(e.cat)curCat=e.cat;if(e.typeSet)curType=e.typeSet;if(e.personSet!==undefined)curPerson=e.personSet;result.push(e)}
  }
  return result;
}
function parseLine(line,curDate,curCat,curType,curPerson){
  let w=line;const entry={date:curDate,cat:null,type:curType,person:curPerson,desc:'',billAmt:null,billCur:null,actualPay:null,payMethod:null,note:null,pending:false};let typeSet,personSet;
  const tm=w.match(/^[（(]?\s*(总|分)\s*/);if(tm){entry.type=tm[1];typeSet=tm[1];w=w.slice(tm[0].length)}
  const pm=w.match(/^(\w)分\s*/);if(pm){entry.person=pm[1];entry.type='分';personSet=pm[1];typeSet='分';w=w.slice(pm[0].length)}
  const ckw=[{re:/^(行|交通|打车|公交|大巴|机票)/,cat:'行'},{re:/^(住|住宿|酒店|民宿)/,cat:'住'},{re:/^(吃|餐|宵夜|早餐|午餐|晚餐|咖啡|蛋糕|牛肉|炸雞|炸鸡|香腸|香肠|脊骨|芝士|烤)/,cat:'吃'},{re:/^(剪发|化妆|发型|肖像|拍照)/,cat:'购物'}];
  for(const kw of ckw){if(kw.re.test(w)&&!entry.cat){entry.cat=kw.cat;break}}
  const pa=w.match(/(支付宝|微信|现金|银行卡)\s*付款?\s*(\d+\.?\d*)\s*(rmb|元|¥)?/i);if(pa){entry.payMethod=pa[1];if(!entry.actualPay)entry.actualPay=parseFloat(pa[2])}
  const am=[...w.matchAll(/(\d+\.?\d*)\s*(rmb|韩币|韩元|韓圓|₩|元|¥|人民币)/gi)];
  if(am.length>0){const pl=w.match(/(\d+\.?\d*)\s*(rmb|元|¥)?\s*\+\s*(\d+\.?\d*)\s*(rmb|元|¥|韩币|韩元|₩)?/i);
    if(pl){const c1=(pl[2]||'').includes('韩')||pl[2]==='₩'?'KRW':'RMB',c2=(pl[4]||c1).includes('韩')||pl[4]==='₩'?'KRW':'RMB';
      entry.billAmt=c1===c2?parseFloat(pl[1])+parseFloat(pl[3]):toRMB(parseFloat(pl[1]),c1)+toRMB(parseFloat(pl[3]),c2);entry.billCur=c1===c2?c1:'RMB'}
    else{const m=am[0];entry.billAmt=parseFloat(m[1]);entry.billCur=(m[2]||'').toLowerCase().includes('韩')||m[2]==='₩'?'KRW':'RMB'}}
  const mm=w.match(/(\d+)\s*\*\s*(\d+)\s*(韩币|韩元|₩|rmb|元|¥)?/i);if(mm){entry.billAmt=parseInt(mm[1])*parseInt(mm[2]);const cs=(mm[3]||'').toLowerCase();entry.billCur=(cs.includes('韩')||cs==='₩')?'KRW':'RMB'}
  if(!entry.payMethod){if(/支付宝/.test(w))entry.payMethod='支付宝';else if(/微信/.test(w))entry.payMethod='微信';else if(/现金/.test(w))entry.payMethod='现金';else if(/银行卡/.test(w))entry.payMethod='银行卡'}
  let d=w;d=d.replace(/\d+\.?\d*\s*(rmb|韩币|韩元|韓圓|₩|元|¥|人民币)/gi,'');d=d.replace(/[（(]\s*\d+\.?\d*\s*(韩币|韩元|₩|krw)?\s*[）)]/gi,'');d=d.replace(/(支付宝|微信|现金|银行卡)\s*付款?/gi,'');d=d.replace(/[：:]\s*$/,'');d=d.replace(/\d+\s*\*\s*\d+/g,'');d=d.replace(/[（(][^）)]*[）)]/g,'');d=d.replace(/[:：]/g,'').replace(/[—\-]+/g,'').trim();
  for(const kw of ckw){const m=d.match(kw.re);if(m)d=d.slice(m[0].length).trim()}
  entry.desc=d||'未命名';if(!entry.cat)entry.cat=curCat;
  if(/\?/.test(line)&&!entry.billAmt){entry.pending=true;entry.billAmt=null;entry.billCur=null;entry.actualPay=null}
  if(entry.billAmt===null&&entry.actualPay===null&&!entry.pending)entry.pending=true;
  entry.typeSet=typeSet;entry.personSet=personSet;return entry;
}

// ── 渲染全部 ──
function renderAll(){renderBills();renderStats();renderPartner();updateDemoCount();updatePendingBar()}

// ══════ 账单（按日期分组）══════
function renderBills(){
  const wrap=document.getElementById('entryListWrap');
  const empty=document.getElementById('emptyBills');
  let filtered=entries;
  if(activeFilter==='pending')filtered=entries.filter(e=>e.pending);
  else if(activeFilter!=='all')filtered=entries.filter(e=>e.cat===activeFilter);
  if(filtered.length===0){wrap.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';

  // 按日期分组
  const groups=new Map();
  filtered.forEach(e=>{const d=e.date||'未标注';if(!groups.has(d))groups.set(d,[]);groups.get(d).push({entry:e,idx:entries.indexOf(e)})});

  let html='';
  for(const [date,items] of groups){
    const dayShared=items.filter(i=>i.entry.type==='总'&&!i.entry.pending).reduce((s,i)=>s+getActualPay(i.entry),0);
    const dayPersonal=items.filter(i=>i.entry.type==='分'&&!i.entry.pending).reduce((s,i)=>s+getActualPay(i.entry),0);

    html+=`<div class="date-group">
      <div class="date-header">
        <div class="date-label">📅 ${date}</div>
        <div class="date-subtotal">
          ${dayShared>0?`<span class="ds-shared">共同 ¥${dayShared.toFixed(2)}</span>`:''}
          ${dayPersonal>0?`<span class="ds-personal">个人 ¥${dayPersonal.toFixed(2)}</span>`:''}
        </div>
      </div>
      <div class="entry-list">`;

    items.forEach(({entry:e,idx})=>{
      const isPersonal=e.type==='分'&&!e.pending;
      const isShared=e.type==='总'&&!e.pending;
      const cardCls=e.pending?'pending':(isPersonal?'type-personal':'type-shared');
      const badgeCls='cat-'+e.cat;
      const badge=catEmoji(e.cat);

      let typeTag='';
      if(e.pending)typeTag='<span class="tag-pending">⚠ 待确认</span>';
      else if(isPersonal)typeTag='<span class="tag-personal">👤 '+(e.person||'某人')+' 全付不摊</span>';
      else typeTag='<span class="tag-shared">👥 共同 ÷'+headCount+'人</span>';

      const billDisp=e.pending?'—':fmtMoneyDual(e.billAmt,e.billCur);
      const actualDisp=e.pending?'—':'¥'+getActualPay(e).toFixed(2);
      const payStr=e.payMethod?e.payMethod:'';
      const noteStr=e.note?`<div style="font-size:10px;color:var(--sub);margin-top:1px">${escHtml(e.note)}</div>`:'';
      const splitHint=isShared?`<div class="split-hint">人均 ¥${(getActualPay(e)/headCount).toFixed(2)}</div>`:(isPersonal?`<div class="split-hint">全部由${e.person||'某人'}承担</div>`:'');

      html+=`<div class="entry-card ${cardCls}" data-idx="${idx}" onclick="openEdit(${idx})">
        <div class="cat-badge ${badgeCls}">${badge}</div>
        <div class="info">
          <div class="desc">${escHtml(e.desc)}</div>
          <div class="meta">${typeTag} <span>${e.date}</span></div>
          ${noteStr}
        </div>
        <div class="amount-col">
          <div class="bill-amt" onclick="event.stopPropagation();toggleCurrency(${idx})" title="点击切换币种">${billDisp}</div>
          <div class="actual-amt">实付 ${actualDisp}</div>
          ${payStr?`<div class="pay-method">${payStr}</div>`:''}
          ${splitHint}
        </div>
      </div>`;
    });

    html+='</div></div>';
  }
  wrap.innerHTML=html;
}

// ══════ 统计（按人拆分）══════
function renderStats(){
  const valid=entries.filter(e=>!e.pending);
  const totalRMB=valid.reduce((s,e)=>s+getActualPay(e),0);
  const sharedItems=valid.filter(e=>e.type==='总');
  const sharedRMB=sharedItems.reduce((s,e)=>s+getActualPay(e),0);
  const perPersonShared=sharedRMB/headCount;

  // 按人归集
  const wPersonal=valid.filter(e=>e.type==='分'&&e.person===partnerName).reduce((s,e)=>s+getActualPay(e),0);
  const myPersonal=valid.filter(e=>e.type==='分'&&e.person===myName).reduce((s,e)=>s+getActualPay(e),0);
  const unassignedPersonal=valid.filter(e=>e.type==='分'&&e.person!==partnerName&&e.person!==myName).reduce((s,e)=>s+getActualPay(e),0);

  // 我：付了所有总消费 + 我的个人消费
  const myTotal=sharedRMB+myPersonal;
  // 伙伴：伙伴的个人消费 + 他该给我的人头
  const partnerTotal=perPersonShared+wPersonal;

  // 顶部人数选择器
  document.getElementById('hcVal').textContent=headCount;

  // 两人卡片
  document.getElementById('personCards').innerHTML=`
    <div class="person-card self">
      <div class="pc-name">🧑 ${myName}（代付人）</div>
      <div class="pc-total">¥${myTotal.toFixed(0)}</div>
      <div class="pc-break">
        代付共同 <span>¥${sharedRMB.toFixed(0)}</span><br>
        ${myPersonal>0?`个人消费 <span>¥${myPersonal.toFixed(0)}</span><br>`:''}
        应收回 <span style="color:var(--accent)">¥${perPersonShared.toFixed(0)}</span>
      </div>
    </div>
    <div class="person-card partner">
      <div class="pc-name">👤 ${partnerName}</div>
      <div class="pc-total">¥${partnerTotal.toFixed(0)}</div>
      <div class="pc-break">
        应分担共同 <span>¥${perPersonShared.toFixed(0)}</span><br>
        ${wPersonal>0?`个人消费 <span>¥${wPersonal.toFixed(0)}</span><br>`:''}
        需还给${myName} <span style="color:var(--primary)">¥${(perPersonShared+wPersonal).toFixed(0)}</span>
      </div>
    </div>`;

  // 四个数字卡片
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-val">¥${totalRMB.toFixed(0)}</div><div class="stat-label">💰 总支出</div><div class="stat-sub">${valid.length}条</div></div>
    <div class="stat-card"><div class="stat-val">¥${sharedRMB.toFixed(0)}</div><div class="stat-label">👥 共同消费</div><div class="stat-sub">÷${headCount}人 = ¥${perPersonShared.toFixed(0)}/人</div></div>
    <div class="stat-card stat-personal-card"><div class="stat-val">¥${(wPersonal+myPersonal+unassignedPersonal).toFixed(0)}</div><div class="stat-label">👤 个人消费（不摊）</div><div class="stat-sub">${wPersonal>0?partnerName+': ¥'+wPersonal.toFixed(0)+' ':''}${myPersonal>0?myName+': ¥'+myPersonal.toFixed(0):''}</div></div>
    <div class="stat-card"><div class="stat-val">¥${perPersonShared.toFixed(0)}</div><div class="stat-label">📤 ${partnerName}应付${myName}</div><div class="stat-sub">共同÷${headCount}+个人</div></div>`;

  // 类目分布
  const cats=['吃','住','行','购物','衣','其他'];
  const catData=cats.map(c=>{const items=valid.filter(e=>e.cat===c);const shared=items.filter(e=>e.type==='总').reduce((s,e)=>s+getActualPay(e),0);const personal=items.filter(e=>e.type==='分').reduce((s,e)=>s+getActualPay(e),0);return{cat:c,total:shared+personal,shared,personal,perPersonShared:shared/headCount,count:items.length}}).filter(d=>d.count>0);
  const colors={'吃':'#e8675a','住':'#5b8cb8','行':'#4a9e8f','购物':'#d4a853','衣':'#9b7ec4','其他':'#8c7b72'};
  const totalCat=catData.reduce((s,d)=>s+d.total,0);
  const svg=document.getElementById('donutChart');const cx=75,cy=75,r=55,sw=12;const circ=2*Math.PI*r;let offset=0,paths='';
  catData.forEach(d=>{const pct=totalCat>0?d.total/totalCat:0;const len=pct*circ;const dash=len+' '+(circ-len);paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[d.cat]}" stroke-width="${sw}" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" stroke-linecap="butt" transform="rotate(-90 75 75)"><title>${d.cat} ¥${d.total.toFixed(0)}</title></circle>`;offset+=len});
  svg.innerHTML=paths+`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="16" font-weight="800" fill="var(--text)">¥${totalCat.toFixed(0)}</text><text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10" fill="var(--sub)">总计</text>`;
  document.getElementById('chartLegend').innerHTML=catData.map(d=>`<div class="legend-item"><span class="legend-dot" style="background:${colors[d.cat]}"></span><span class="legend-name">${d.cat}</span><span class="legend-val">¥${d.total.toFixed(0)}</span><span style="font-size:10px;color:var(--sub)">${totalCat>0?(d.total/totalCat*100).toFixed(0):0}%</span></div>`).join('');

  // 类目明细表（含人均）
  document.getElementById('categoryTable').innerHTML=`<thead><tr><th>类目</th><th>条</th><th>共同</th><th>个人</th><th>人均(÷${headCount})</th></tr></thead><tbody>${catData.map(d=>`<tr><td><span class="cat-dot" style="background:${colors[d.cat]}"></span>${catEmoji(d.cat)} ${d.cat}</td><td>${d.count}</td><td>¥${d.shared.toFixed(2)}</td><td>¥${d.personal.toFixed(2)}</td><td>¥${d.perPersonShared.toFixed(2)}</td></tr>`).join('')}</tbody>`;
}

// ══════ 伙伴视图 ══════
function renderPartner(){
  const valid=entries.filter(e=>!e.pending);
  const totalRMB=valid.reduce((s,e)=>s+getActualPay(e),0);
  const sharedItems=valid.filter(e=>e.type==='总');
  const sharedRMB=sharedItems.reduce((s,e)=>s+getActualPay(e),0);
  const perPersonShared=sharedRMB/headCount;
  const wPersonal=valid.filter(e=>e.type==='分'&&e.person===partnerName).reduce((s,e)=>s+getActualPay(e),0);
  const wTotal=perPersonShared+wPersonal;

  document.getElementById('partnerHeader').innerHTML=`<div class="total-label">🇰🇷 韩国双人旅行</div><div class="total-spent">¥${totalRMB.toFixed(2)}</div>`;

  document.getElementById('partnerOwe').innerHTML=`
    <h4>💰 ${partnerName} 需还给 ${myName}</h4>
    <div class="owe-amount">¥${wTotal.toFixed(2)}</div>
    <div class="owe-detail">= 共同消费 ¥${sharedRMB.toFixed(2)} ÷ ${headCount}人 + ${partnerName}个人 ¥${wPersonal.toFixed(2)}</div>`;

  document.getElementById('reimburseBox').innerHTML=`
    <h4>📐 结算明细</h4>
    <div class="rb-line"><span>共同消费总计</span><span class="rb-val">¥${sharedRMB.toFixed(2)}</span></div>
    <div class="rb-line"><span>÷ ${headCount} 人</span><span class="rb-val">¥${perPersonShared.toFixed(2)}/人</span></div>
    ${wPersonal>0?`<div class="rb-line"><span>+ ${partnerName}个人消费</span><span class="rb-val">¥${wPersonal.toFixed(2)}</span></div>`:''}
    ${wPersonal>0?`<div class="rb-divider"></div><div class="rb-line"><span><strong>${partnerName}应付总额</strong></span><span class="rb-val" style="color:var(--primary)">¥${wTotal.toFixed(2)}</span></div>`:''}
    <div style="font-size:11px;color:var(--sub);margin-top:6px">💡 ${myName}代付了全部共同消费${sharedItems.length}条，${partnerName}按人头分担其中一份。分（个人）条目已单独归属。</div>`;

  document.getElementById('partnerHeadcount').textContent=headCount;

  const cats=['吃','住','行','购物','衣','其他'];
  document.getElementById('partnerCatTable').innerHTML=`<thead><tr><th>类目</th><th>条</th><th>共同</th><th>人均(÷${headCount})</th></tr></thead><tbody>${cats.map(c=>{const items=sharedItems.filter(e=>e.cat===c);const t=items.reduce((s,e)=>s+getActualPay(e),0);return t>0?`<tr><td><span class="cat-dot cat-stripe-${c}"></span>${catEmoji(c)} ${c}</td><td>${items.length}</td><td>¥${t.toFixed(2)}</td><td>¥${(t/headCount).toFixed(2)}</td></tr>`:''}).filter(Boolean).join('')}</tbody>`;
}

function updatePendingBar(){
  const pending=entries.filter(e=>e.pending);const bar=document.getElementById('pendingBar');
  if(pending.length>0){bar.style.display='flex';document.getElementById('pendingText').textContent=`${pending.length} 条待确认（${pending.map(e=>e.desc).join('、')}）`}else{bar.style.display='none'}
}
function updateDemoCount(){document.getElementById('demoCount').textContent=entries.length}

// ── 交互 ──
function toggleCurrency(idx){showAllRMB=!showAllRMB;updateCurrencyBtn();renderAll();showToast(showAllRMB?'全部显示人民币 ¥':'显示原始币种')}
function updateCurrencyBtn(){const b=document.getElementById('globalCurrencyBtn');if(showAllRMB){b.innerHTML='<span>¥ RMB</span>';b.classList.add('showing-rmb')}else{b.innerHTML='<span>₩⇄¥</span>';b.classList.remove('showing-rmb')}}
function openEdit(idx){editingIdx=idx;const e=entries[idx];document.getElementById('editDesc').value=e.desc||'';document.getElementById('editDate').value=e.date||'';document.getElementById('editCat').value=e.cat||'其他';document.getElementById('editType').value=e.type||'总';document.getElementById('editPerson').value=e.person||'';document.getElementById('editBillAmt').value=e.billAmt||'';document.getElementById('editBillCur').value=e.billCur||'RMB';document.getElementById('editActualPay').value=e.actualPay||'';document.getElementById('editPayMethod').value=e.payMethod||'';document.getElementById('editModal').style.display='flex'}
function saveEdit(){const e=entries[editingIdx];e.desc=document.getElementById('editDesc').value||'未命名';e.date=document.getElementById('editDate').value;e.cat=document.getElementById('editCat').value;e.type=document.getElementById('editType').value;e.person=document.getElementById('editPerson').value||null;const ba=document.getElementById('editBillAmt').value;e.billAmt=ba?parseFloat(ba):null;e.billCur=document.getElementById('editBillCur').value;const ap=document.getElementById('editActualPay').value;e.actualPay=ap?parseFloat(ap):null;e.payMethod=document.getElementById('editPayMethod').value||null;e.pending=(e.billAmt===null&&e.actualPay===null);closeEdit();saveData();renderAll()}
function deleteEdit(){if(editingIdx>=0){entries.splice(editingIdx,1);closeEdit();saveData();renderAll()}}
function closeEdit(){document.getElementById('editModal').style.display='none';editingIdx=-1}
function saveData(){localStorage.setItem(STORE_KEY,JSON.stringify(entries));localStorage.setItem(HC_KEY,headCount.toString());localStorage.setItem(NAMES_KEY,JSON.stringify({my:myName,partner:partnerName}))}
function showToast(msg){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),1500)}
function sharePartner(){
  const valid=entries.filter(e=>!e.pending);const shared=valid.filter(e=>e.type==='总');const sharedRMB=shared.reduce((s,e)=>s+getActualPay(e),0);const per=sharedRMB/headCount;const wPersonal=valid.filter(e=>e.type==='分'&&e.person===partnerName).reduce((s,e)=>s+getActualPay(e),0);const cats=['吃','住','行','购物'];const cl=cats.map(c=>{const t=shared.filter(e=>e.cat===c).reduce((s,e)=>s+getActualPay(e),0);return t>0?`${catEmoji(c)} ${c}: ¥${t.toFixed(2)} → 人均 ¥${(t/headCount).toFixed(2)}`:null}).filter(Boolean);
  const text=`🌏 旅行账单\n总共同消费: ¥${sharedRMB.toFixed(2)}\n÷${headCount}人 = ¥${per.toFixed(2)}/人\n${wPersonal>0?`+ 你个人: ¥${wPersonal.toFixed(2)}\n`:''}应付: ¥${(per+wPersonal).toFixed(2)}\n\n📊 各类目:\n${cl.join('\n')}`;
  if(navigator.share)navigator.share({title:'旅行账单',text}).catch(()=>{});else{navigator.clipboard.writeText(text).then(()=>showToast('已复制到剪贴板'))}
}

// ── 事件 ──
function bindEvents(){
  document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  document.querySelectorAll('.filter-chip').forEach(c=>c.addEventListener('click',function(){document.querySelectorAll('.filter-chip').forEach(x=>x.classList.remove('active'));this.classList.add('active');activeFilter=this.dataset.filter;renderBills()}));
  document.getElementById('parseBtn').addEventListener('click',()=>{const t=document.getElementById('rawInput').value.trim();if(!t){showToast('请先粘贴账单文字');return}const p=parseText(t);if(p.length===0){showToast('未能识别到账单条目');return}entries=[...entries,...p];saveData();renderAll();document.getElementById('parseResult').textContent=`✅ 成功识别 ${p.length} 条新记录`;document.getElementById('rawInput').value='';setTimeout(()=>document.getElementById('parseResult').textContent='',2000);switchTab('bills')});
  document.getElementById('globalCurrencyBtn').addEventListener('click',()=>{showAllRMB=!showAllRMB;updateCurrencyBtn();renderAll();showToast(showAllRMB?'全部显示人民币 ¥':'显示原始币种')});

  // 人数选择
  document.getElementById('hcMinus').addEventListener('click',()=>{if(headCount>1){headCount--;saveData();renderAll()}});
  document.getElementById('hcPlus').addEventListener('click',()=>{headCount++;saveData();renderAll()});

  // 设置
  document.getElementById('settingsBtn').addEventListener('click',()=>{document.getElementById('krwRate').value=krwRate;document.getElementById('rateExample').textContent=(krwRate*10000).toFixed(0);document.getElementById('setHcVal').textContent=headCount;document.getElementById('myNameInput').value=myName;document.getElementById('partnerNameInput').value=partnerName;document.getElementById('settingsModal').style.display='flex'});
  document.getElementById('krwRate').addEventListener('input',function(){document.getElementById('rateExample').textContent=(parseFloat(this.value||0)*10000).toFixed(0)});
  document.getElementById('setHcMinus').addEventListener('click',()=>{const v=parseInt(document.getElementById('setHcVal').textContent);if(v>1)document.getElementById('setHcVal').textContent=v-1});
  document.getElementById('setHcPlus').addEventListener('click',()=>{const v=parseInt(document.getElementById('setHcVal').textContent);document.getElementById('setHcVal').textContent=v+1});
  document.getElementById('settingsCancel').addEventListener('click',()=>document.getElementById('settingsModal').style.display='none');
  document.getElementById('settingsSave').addEventListener('click',()=>{const r=parseFloat(document.getElementById('krwRate').value);if(r&&r>0){krwRate=r;localStorage.setItem(RATE_KEY,r.toString())}headCount=parseInt(document.getElementById('setHcVal').textContent)||2;myName=document.getElementById('myNameInput').value||'我';partnerName=document.getElementById('partnerNameInput').value||'w';saveData();renderAll();document.getElementById('settingsModal').style.display='none';showToast('设置已保存')});

  document.getElementById('editCancel').addEventListener('click',closeEdit);
  document.getElementById('editSave').addEventListener('click',saveEdit);
  document.getElementById('editDelete').addEventListener('click',deleteEdit);
  document.getElementById('shareBtn').addEventListener('click',sharePartner);
  document.getElementById('settingsModal').addEventListener('click',function(e){if(e.target===this)this.style.display='none'});
  document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeEdit()});
  updateCurrencyBtn();
}

function switchTab(tab){activeTab=tab;document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');if(tab==='bills')renderBills();if(tab==='stats')renderStats();if(tab==='partner')renderPartner()}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ── 启动 ──
function init(){
  const sr=localStorage.getItem(RATE_KEY);if(sr)krwRate=parseFloat(sr);
  const sh=localStorage.getItem(HC_KEY);if(sh)headCount=parseInt(sh)||2;
  const sn=localStorage.getItem(NAMES_KEY);if(sn){try{const n=JSON.parse(sn);myName=n.my||'我';partnerName=n.partner||'w'}catch(e){}}
  const sd=localStorage.getItem(STORE_KEY);if(sd){try{entries=JSON.parse(sd)}catch(e){entries=[...DEMO_DATA]}}else{entries=[...DEMO_DATA]}
  updateDemoCount();renderAll();bindEvents();
}
init();
</script>
</body>
</html>
